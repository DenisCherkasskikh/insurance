syntax = "proto3";
package denischerkasskikh.insurance.insurance;

option go_package = "github.com/DenisCherkasskikh/insurance/x/insurance/types";

message CrashRecord {
  string index = 1; 
  string brand = 2; 
  string model = 3; 
  string owner = 4; 
  string licencePlate = 5; 
  string vinNumber = 6; 
  string mileage = 7; 
  string side = 8; 
  string part = 9; 
  string payout = 10; 
  
}

